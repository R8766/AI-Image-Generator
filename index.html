<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI image generator</title>
    <!--Linking font awesome for icons-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- First Landing Page -->
    <div id="landing-page" class="landing-page">
        <h1 id="heading">Ready to turn your <p id="color">Imagination</p> into reality? ✨🎨🚀</h1>
        <p class="subheading">"From your mind to the canvas — in seconds. 🧠⏱️🖼️"</p>
        <button id="get-started-btn" class="get-started-btn">Get Started</button>
    </div>

    <!-- Main AI Image Generator Container (hidden initially) -->
    <div class="container" id="main-container" style="display: none;">
        <!--Header-->
        <header class="header">
            <div class="logo-wrapper">
                <div class="logo">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <h1> AI Image Generator</h1>
            </div>
            <buton class="theme-toggle">
                <i class="fa-solid fa-moon"></i>
            </buton>
        </header>

        <div class="main-content">
            <form action="#" class="prompt-form">
                <!--Prompt Container-->
                <div class="prompt-container">
                    <textarea class="prompt-input" placeholder="Describe your imagination in detail..." required autofocus></textarea>
                    <buton type="button" class="prompt-btn">
                        <i class="fa-solid fa-dice"></i>
                    </buton>
                </div>

                <!--PromptActions/Buttons-->
                <div class="prompt-actions">
                    <div class="select-wrapper">
                        <select class="custom-select" id="model-select" required>
                            <option value="" selected disabled>Select Model</option>
                            <option value="stabilityai/stable-diffusion-xl-base-1.0">StableDiffusion XL</option>
                            <option value="stabilityai/stable-diffusion-3-medium-diffusers">Stable diffusion 3</option>
                        </select>
                    </div>

                    <div class="select-wrapper">
                        <select class="custom-select" id="count-select" required>
                            <option value="" selected disabled>Image Count</option>
                            <option value="1">1 Image</option>
                            <option value="2">2 Images</option>
                            <option value="3">3 Images</option>
                            <option value="4">4 Images</option>
                        </select>
                    </div>

                    <div class="select-wrapper">
                        <select class="custom-select" id="ratio-select" required>
                            <option value="" selected disabled>Aspect Ratio</option>
                            <option value="1/1">Square (1:1)</option>
                            <option value="16/9">Landscape (16:9)</option>
                            <option value="9/16">Portrait (9:16)</option>
                        </select>
                    </div>

                    <button type="submit" class="generate-btn">
                        <i class="fa-solid fa-wand-sparkles"></i>
                        Generate
                    </button>
                </div>

                <!--Result Gallery Grid-->
                <div class="gallery-grid"></div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
